version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/app/data/dev.db"
      PORT: "3000"
      JWT_SECRET: "${JWT_SECRET:-change-this-to-a-random-secret-before-deploying}"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - backend_db:/app/data

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/lernzeit-manager:/app
    working_dir: /app
    command: sh -c "npm install && npm run dev"

volumes:
  backend_db:
